<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蠢驴电竞 - 陪玩端</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Microsoft YaHei', sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .container { width: 400px; background: #16213e; border-radius: 12px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  h1 { text-align: center; font-size: 20px; margin-bottom: 20px; color: #e94560; }
  .status-bar { background: #0f3460; border-radius: 8px; padding: 16px; margin-bottom: 16px; text-align: center; }
  .mode-label { font-size: 24px; font-weight: bold; }
  .mode-work { color: #e94560; }
  .mode-entertainment { color: #00ff88; }
  .timers { display: flex; justify-content: space-around; margin-top: 12px; }
  .timer { text-align: center; }
  .timer .value { font-size: 28px; font-weight: bold; font-family: monospace; }
  .timer .label { font-size: 12px; color: #888; margin-top: 4px; }
  .buttons { display: flex; gap: 12px; }
  .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
  .btn-work { background: #e94560; color: white; }
  .btn-entertainment { background: #00ff88; color: #1a1a2e; }
  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  /* Order notification */
  .order-notify {
    margin-top: 16px;
    border-radius: 8px;
    background: #0f3460;
    border: 1px solid #e94560;
    overflow: hidden;
    animation: slideIn 0.4s ease-out;
  }
  .order-notify-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: rgba(233,69,96,0.15);
  }
  .order-notify-header .title {
    font-size: 14px;
    font-weight: bold;
    color: #e94560;
  }
  .order-notify-header .dismiss {
    font-size: 18px;
    color: #888;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
    background: none;
    border: none;
    padding: 0;
  }
  .order-notify-header .dismiss:hover { color: #e94560; }
  .order-notify-body { padding: 12px 14px; }
  .order-notify-body .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .order-notify-body .row:last-child { margin-bottom: 0; }
  .order-notify-body .label { font-size: 12px; color: #888; }
  .order-notify-body .val { font-size: 13px; color: #e0e0e0; }
  .order-notify-body .amount {
    font-size: 18px;
    font-weight: bold;
    color: #00ff88;
  }
  .order-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .order-actions .btn-confirm {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    background: #00c853;
    color: white;
  }
  .order-actions .btn-complete {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    background: #2979ff;
    color: white;
  }
  .order-actions .btn-confirm:hover,
  .order-actions .btn-complete:hover {
    opacity: 0.85;
    transform: translateY(-1px);
  }
  .order-actions .btn-confirm:active,
  .order-actions .btn-complete:active {
    transform: translateY(0);
  }
  .order-actions .btn-confirm:disabled,
  .order-actions .btn-complete:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .order-type-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
  }
  .tag-NEW { background: #1e90ff; color: white; }
  .tag-RENEW { background: #00bcd4; color: white; }
  .tag-REPURCHASE { background: #9b59b6; color: white; }
  .tag-TIP { background: #ff9800; color: white; }

  @keyframes slideIn {
    from { transform: translateY(-24px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🎮 蠢驴电竞陪玩端</h1>
  <div class="status-bar">
    <div class="mode-label" id="modeLabel">--</div>
    <div class="timers">
      <div class="timer">
        <div class="value" id="workTime">00:00:00</div>
        <div class="label">接单时间</div>
      </div>
      <div class="timer">
        <div class="value" id="entertainTime">00:00:00</div>
        <div class="label">娱乐时间</div>
      </div>
      <div class="timer">
        <div class="value" id="totalTime">00:00:00</div>
        <div class="label">总运行时间</div>
      </div>
    </div>
  </div>
  <div class="buttons">
    <button class="btn btn-work" onclick="switchMode('WORK')">🔴 接单模式</button>
    <button class="btn btn-entertainment" onclick="switchMode('ENTERTAINMENT')">🟢 娱乐模式</button>
  </div>
  <div id="orderNotify" class="order-notify" style="display:none;">
    <div class="order-notify-header">
      <span class="title">📋 当前订单</span>
      <button class="dismiss" onclick="dismissOrder()">&times;</button>
    </div>
    <div class="order-notify-body">
      <div class="row">
        <span class="label">游戏</span>
        <span class="val" id="orderGameName">--</span>
      </div>
      <div class="row">
        <span class="label">金额</span>
        <span class="amount" id="orderAmount">¥0.00</span>
      </div>
      <div class="row">
        <span class="label">类型</span>
        <span id="orderTypeTag">--</span>
      </div>
      <div class="order-actions">
        <button class="btn-confirm" onclick="confirmOrder()" id="btnConfirm">✅ 确认接单</button>
        <button class="btn-complete" onclick="completeOrder()" id="btnComplete">✔️ 完成</button>
      </div>
    </div>
  </div>
</div>

<script>
function formatTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
}

async function fetchStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    const el = document.getElementById('modeLabel');
    if (data.mode === 'WORK') {
      el.textContent = '🔴 接单中';
      el.className = 'mode-label mode-work';
    } else {
      el.textContent = '🟢 娱乐中';
      el.className = 'mode-label mode-entertainment';
    }
    document.getElementById('workTime').textContent = formatTime(data.workSec);
    document.getElementById('entertainTime').textContent = formatTime(data.entertainSec);
    document.getElementById('totalTime').textContent = formatTime(data.totalSec);
  } catch (e) {
    console.error('Status fetch failed:', e);
  }
}

async function switchMode(mode) {
  try {
    await fetch('/api/mode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode }),
    });
    fetchStatus();
  } catch (e) {
    console.error('Mode switch failed:', e);
  }
}

fetchStatus();
setInterval(fetchStatus, 5000);

// ---- Order Notification ----
const ORDER_TYPE_LABELS = {
  NEW: '新单',
  RENEW: '续费',
  REPURCHASE: '复购',
  TIP: '打赏',
};

let lastOrderId = '';
let orderPending = false;

function dismissOrder() {
  const el = document.getElementById('orderNotify');
  el.style.display = 'none';
  lastOrderId = '';
}

async function confirmOrder() {
  if (orderPending) return;
  orderPending = true;
  const btn = document.getElementById('btnConfirm');
  btn.disabled = true;
  btn.textContent = '⏳ 确认中...';
  try {
    await fetch('/api/orders/confirm', { method: 'POST' });
    dismissOrder();
  } catch (e) {
    console.error('Confirm order failed:', e);
    btn.disabled = false;
    btn.textContent = '✅ 确认接单';
  } finally {
    orderPending = false;
  }
}

async function completeOrder() {
  if (orderPending) return;
  orderPending = true;
  const btn = document.getElementById('btnComplete');
  btn.disabled = true;
  btn.textContent = '⏳ 完成中...';
  try {
    await fetch('/api/orders/complete', { method: 'POST' });
    dismissOrder();
  } catch (e) {
    console.error('Complete order failed:', e);
    btn.disabled = false;
    btn.textContent = '✔️ 完成';
  } finally {
    orderPending = false;
  }
}

async function fetchLatestOrder() {
  try {
    const res = await fetch('/api/orders/latest');
    const order = await res.json();
    if (!order || !order.id) return;
    if (order.id === lastOrderId) return;

    lastOrderId = order.id;
    document.getElementById('orderGameName').textContent = order.gameName || '--';
    document.getElementById('orderAmount').textContent =
      '¥' + (order.amount != null ? Number(order.amount).toFixed(2) : '0.00');

    const orderType = order.type || order.orderType || '';
    const label = ORDER_TYPE_LABELS[orderType] || orderType;
    const tag = document.getElementById('orderTypeTag');
    tag.textContent = label;
    tag.className = 'order-type-tag tag-' + orderType;

    // Reset action buttons
    const btnConfirm = document.getElementById('btnConfirm');
    btnConfirm.disabled = false;
    btnConfirm.textContent = '✅ 确认接单';
    const btnComplete = document.getElementById('btnComplete');
    btnComplete.disabled = false;
    btnComplete.textContent = '✔️ 完成';

    const el = document.getElementById('orderNotify');
    // Trigger re-animation
    el.style.display = 'none';
    void el.offsetWidth;
    el.style.display = 'block';

    // No auto-dismiss — only dismiss on action or manual dismiss
  } catch (e) {
    // Silently ignore — endpoint may not be ready yet
  }
}

setInterval(fetchLatestOrder, 3000);
fetchLatestOrder();
</script>
</body>
</html>
